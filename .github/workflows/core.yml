name: Core

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    tags: [ v* ]
  pull_request:
  merge_group:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_BASEDIR: "${{ github.workspace }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Write key
        if: ${{ ( github.event_name != 'pull_request' && github.ref == 'refs/heads/master' ) || github.ref_type == 'tag' }}
        run: |
          if [ ! -z "${{ secrets.KEY_STORE }}" ]; then
            echo androidStorePassword='${{ secrets.KEY_STORE_PASSWORD }}' >> gradle.properties
            echo androidKeyAlias='${{ secrets.ALIAS }}' >> gradle.properties
            echo androidKeyPassword='${{ secrets.KEY_PASSWORD }}' >> gradle.properties
            echo androidStoreFile='key.jks' >> gradle.properties
            echo ${{ secrets.KEY_STORE }} | base64 --decode > key.jks
          fi

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure Gradle properties
        run: |
          echo 'android.native.buildOutput=verbose' >> ~/.gradle/gradle.properties
          echo 'org.gradle.parallel=true' >> ~/.gradle/gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -XX:+UseParallelGC' >> ~/.gradle/gradle.properties

      - name: Setup ninja
        uses: seanmiddleditch/gha-setup-ninja@v4
        with:
          version: 1.12.1

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.ccache
            ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/build.gradle') }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Remove Android's cmake
        shell: bash
        run: rm -rf "$ANDROID_HOME/cmake"

      - name: Build with Gradle
        run: ./gradlew zipAll

      - name: Prepare artifact
        if: success()
        id: prepareArtifact
        shell: bash
        run: |
          set -euo pipefail

          release_zip="$(find zygisk/release -maxdepth 1 -type f -name 'Vector-v*-Release.zip' | head -n 1)"
          debug_zip="$(find zygisk/release -maxdepth 1 -type f -name 'Vector-v*-Debug.zip' | head -n 1)"

          if [ -z "${release_zip}" ] || [ -z "${debug_zip}" ]; then
            echo "::error::Release/Debug zip not found under zygisk/release"
            ls -la zygisk/release || true
            exit 1
          fi

          zygiskReleaseName="$(basename "${release_zip}" .zip)"
          zygiskDebugName="$(basename "${debug_zip}" .zip)"

          echo "zygiskReleaseName=${zygiskReleaseName}" >> "$GITHUB_OUTPUT"
          echo "zygiskDebugName=${zygiskDebugName}" >> "$GITHUB_OUTPUT"

          rm -rf Vector-Release Vector-Debug
          mkdir -p Vector-Release Vector-Debug
          unzip -o "${release_zip}" -d Vector-Release
          unzip -o "${debug_zip}" -d Vector-Debug

      - name: Upload zygisk release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepareArtifact.outputs.zygiskReleaseName }}
          path: "./Vector-Release/*"
          if-no-files-found: error

      - name: Upload zygisk debug
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepareArtifact.outputs.zygiskDebugName }}
          path: "./Vector-Debug/*"
          if-no-files-found: error

      - name: Upload mappings
        uses: actions/upload-artifact@v4
        with:
          name: mappings
          path: |
            zygisk/build/outputs/mapping
            app/build/outputs/mapping
          if-no-files-found: warn

      - name: Upload symbols
        uses: actions/upload-artifact@v4
        with:
          name: symbols
          path: build/symbols
          if-no-files-found: warn